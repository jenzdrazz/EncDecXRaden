<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enc/Dec Your Private Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #e0e5ec;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #e0e5ec;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 9px 9px 16px #b8b9be, -9px -9px 16px #ffffff;
      transition: all 0.3s ease-in-out;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #222;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      background: #e0e5ec;
      box-shadow: inset 4px 4px 6px #babecc, inset -4px -4px 6px #ffffff;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus, textarea:focus, select:focus {
      box-shadow: inset 2px 2px 5px #babecc, inset -2px -2px 5px #ffffff;
    }

    button {
      background-color: #4f46e5;
      color: white;
      font-weight: 600;
      box-shadow: 4px 4px 8px #babecc, -4px -4px 8px #ffffff;
      transition: 0.3s ease;
      cursor: pointer;
    }

    button:hover {
      background-color: #4338ca;
    }

    .danger {
      background-color: #ef4444;
    }

    .danger:hover {
      background-color: #b91c1c;
    }

    pre {
      background-color: #f3f4f6;
      padding: 16px;
      border-radius: 12px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 0.95rem;
      overflow-x: auto;
      box-shadow: inset 2px 2px 6px #babecc, inset -2px -2px 6px #ffffff;
    }

    #obfuscatorPanel {
      display: none;
    }

    #msg {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container" id="authPanel">
    <h1>Login or Register</h1>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <p id="msg" style="color: red;"></p>
  </div>

  <div class="container" id="obfuscatorPanel">
    <h1>Radenn Matcha cih🌿☘️</h1>
    <select id="method">
      <option value="rot13">ROT13</option>
      <option value="hex">Hex</option>
      <option value="charcode">CharCode</option>
      <option value="base64">Base64</option>
    </select>
    <input type="number" id="times" placeholder="How many times?" min="5" value="5">
    <textarea id="input" placeholder="Enter your code here..."></textarea>
    <button onclick="obfuscate()">Obfuscate</button>
    <button onclick="decode()">Decode</button>
    <button onclick="copyOutput()">Copy Output</button>
    <textarea id="output">// Result will show here...</textarea>
    <button onclick="logout()" class="danger">Logout</button>
  </div>

  <script>
    function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) return alert('Please fill in all fields.');
      if (localStorage.getItem('user_' + email)) return alert('Account already exists.');
      localStorage.setItem('user_' + email, password);
      alert('Registration successful! Please log in.');
    }

    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const stored = localStorage.getItem('user_' + email);
      if (stored && stored === password) {
        localStorage.setItem('loggedIn', email);
        loadObfuscator();
      } else {
        document.getElementById('msg').textContent = 'Login failed. Please try again.';
      }
    }

    function logout() {
      localStorage.removeItem('loggedIn');
      location.reload();
    }

    function loadObfuscator() {
      document.getElementById('authPanel').style.display = 'none';
      document.getElementById('obfuscatorPanel').style.display = 'block';
    }

    window.onload = () => {
      if (localStorage.getItem('loggedIn')) loadObfuscator();
    };

    function obfuscate() {
      let input = document.getElementById('input').value;
      const method = document.getElementById('method').value;
      const times = parseInt(document.getElementById('times').value) || 1;
      let output = input;

      try {
        for (let i = 0; i < times; i++) {
          if (method === 'base64') output = btoa(output);
          else if (method === 'hex') output = output.split('').map(c => '\\x' + c.charCodeAt(0).toString(16)).join('');
          else if (method === 'charcode') output = output.split('').map(c => c.charCodeAt(0)).join(',');
          else if (method === 'rot13') output = output.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
          });
        }
      } catch (e) {
        output = 'Error obfuscating input.';
      }

      document.getElementById('output').textContent = output;
    }

    function decode() {
      let input = document.getElementById('input').value;
      const method = document.getElementById('method').value;
      const times = parseInt(document.getElementById('times').value) || 1;
      let output = input;

      try {
        for (let i = 0; i < times; i++) {
          if (method === 'base64') output = atob(output);
          else if (method === 'hex') output = decodeURIComponent(output.replace(/\\x/g, '%'));
          else if (method === 'charcode') output = String.fromCharCode(...output.split(',').map(n => parseInt(n.trim())));
          else if (method === 'rot13') output = output.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
          });
        }
      } catch (e) {
        output = 'Error decoding input.';
      }

      document.getElementById('output').textContent = output;
    }

    function copyOutput() {
      const output = document.getElementById('output').textContent;
      navigator.clipboard.writeText(output).then(() => alert("Output copied!"));
    }
  </script>
</body>
</html>
